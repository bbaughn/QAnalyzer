<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; padding: 20px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; color: #fff; }
  .bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .bar input { background: #1a1d27; border: 1px solid #333; color: #e0e0e0; padding: 6px 10px; border-radius: 4px; font-size: 13px; }
  .bar input#token { width: 200px; }
  button { background: #2563eb; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button:hover { background: #1d4ed8; }
  button.danger { background: #dc2626; }
  button.danger:hover { background: #b91c1c; }
  button.warn { background: #d97706; }
  button.warn:hover { background: #b45309; }
  button.green { background: #16a34a; }
  button.green:hover { background: #15803d; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .info { background: #1a1d27; border: 1px solid #333; border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 13px; display: flex; gap: 20px; flex-wrap: wrap; }
  .info span { color: #9ca3af; }
  .info strong { color: #e0e0e0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #333; color: #9ca3af; font-weight: 500; }
  td { padding: 7px 10px; border-bottom: 1px solid #1f2937; vertical-align: top; }
  tr:hover td { background: #1a1d27; }
  .status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .status.queued { background: #1e3a5f; color: #60a5fa; }
  .status.running { background: #3b2f1a; color: #fbbf24; }
  .status.succeeded { background: #14432a; color: #4ade80; }
  .status.failed { background: #3b1a1a; color: #f87171; }
  .source { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; font-size: 12px; }
  .actions { display: flex; gap: 4px; }
  .actions button { padding: 3px 8px; font-size: 11px; }
  .time { font-size: 12px; color: #9ca3af; white-space: nowrap; }
  .error { font-size: 11px; color: #f87171; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1e3a5f; color: #60a5fa; padding: 10px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
  .cookie-form { display: flex; gap: 8px; align-items: center; }
  .cookie-form input[type=file] { font-size: 12px; }
</style>
</head>
<body>

<h1>QAnalyzer Admin</h1>

<div class="bar">
  <label>Token: <input type="password" id="token" placeholder="admin token"></label>
  <button onclick="refresh()">Refresh</button>
  <button class="warn" onclick="resetStuck()">Reset Stuck Jobs</button>
  <button class="danger" onclick="cleanup()">Cleanup Disk</button>
  <button class="danger" onclick="deleteAllFailed()">Delete All Failed</button>
  <div class="cookie-form">
    <input type="file" id="cookieFile" accept=".txt">
    <button class="green" onclick="uploadCookies()">Upload Cookies</button>
  </div>
</div>

<div class="info" id="debugInfo">Loading...</div>

<table>
  <thead>
    <tr>
      <th>Status</th>
      <th>Source</th>
      <th>Created</th>
      <th>Duration</th>
      <th>Error</th>
      <th>Ver</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="jobsBody"></tbody>
</table>

<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
const getToken = () => {
  const t = $('#token').value;
  if (t) localStorage.setItem('qa_token', t);
  return t || localStorage.getItem('qa_token') || '';
};

window.addEventListener('load', () => {
  const saved = localStorage.getItem('qa_token');
  if (saved) $('#token').value = saved;
  refresh();
});

function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function api(method, path, body) {
  const sep = path.includes('?') ? '&' : '?';
  const url = path + sep + 'token=' + encodeURIComponent(getToken());
  const opts = { method };
  if (body) { opts.body = body; }
  const r = await fetch(url, opts);
  return r.json();
}

function fmtTime(iso) {
  if (!iso || iso === 'None') return '';
  const d = new Date(iso + 'Z');
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function duration(started, finished) {
  if (!started || started === 'None') return '';
  const s = new Date(started + 'Z');
  const f = (finished && finished !== 'None') ? new Date(finished + 'Z') : new Date();
  const sec = Math.round((f - s) / 1000);
  if (sec < 60) return sec + 's';
  return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
}

function extractVideoId(url) {
  try {
    const u = new URL(url);
    return u.searchParams.get('v') || url;
  } catch { return url; }
}

async function refresh() {
  try {
    const [debug, jobs] = await Promise.all([
      api('GET', '/admin/debug'),
      api('GET', '/admin/jobs'),
    ]);

    const info = $('#debugInfo');
    info.innerHTML = `
      <span>Version: <strong>${debug.app_version || '?'}</strong></span>
      <span>yt-dlp: <strong>${debug['yt-dlp']?.version || 'N/A'}</strong></span>
      <span>Node: <strong>${debug.node?.version || 'N/A'}</strong></span>
      <span>Cookies: <strong>${debug.cookies?.exists ? 'Yes' : 'No'}</strong></span>
      <span>Disk: <strong>${debug.disk_usage || '?'}</strong></span>
    `;

    const tbody = $('#jobsBody');
    tbody.innerHTML = '';
    for (const j of jobs.jobs) {
      const tr = document.createElement('tr');
      const vid = extractVideoId(j.source);
      tr.innerHTML = `
        <td><span class="status ${j.status}">${j.status}</span></td>
        <td class="source" title="${j.source}"><a href="${j.source}" target="_blank" style="color:#60a5fa;text-decoration:none">${vid}</a></td>
        <td class="time">${fmtTime(j.created_at)}</td>
        <td class="time">${duration(j.started_at, j.finished_at)}</td>
        <td class="error" title="${j.error_message || ''}">${j.error_code || ''}</td>
        <td class="time">${j.analyzer_version || ''}</td>
        <td class="actions">
          ${j.status === 'queued' || j.status === 'running' ? `<button class="danger" onclick="cancelJob('${j.id}')">Cancel</button>` : ''}
          ${j.status === 'failed' ? `<button class="warn" onclick="requeueJob('${j.id}')">Requeue</button>` : ''}
          ${j.status !== 'running' ? `<button class="danger" onclick="deleteJob('${j.id}')">Delete</button>` : ''}
        </td>
      `;
      tbody.appendChild(tr);
    }
  } catch (e) {
    toast('Error: ' + e.message);
  }
}

async function cancelJob(id) {
  const r = await api('POST', `/admin/cancel-job/${id}`);
  toast(`Cancelled: ${r.old_status} -> failed`);
  refresh();
}

async function requeueJob(id) {
  const r = await api('POST', `/admin/requeue-job/${id}`);
  toast(`Requeued: ${r.old_status} -> queued`);
  refresh();
}

async function deleteJob(id) {
  if (!confirm('Delete this job permanently?')) return;
  await api('POST', `/admin/delete-job/${id}`);
  toast('Deleted');
  refresh();
}

async function resetStuck() {
  const r = await api('POST', '/admin/reset-stuck-jobs');
  toast(`Reset ${r.reset} stuck jobs`);
  refresh();
}

async function deleteAllFailed() {
  if (!confirm('Delete ALL failed jobs?')) return;
  const r = await api('POST', '/admin/delete-all-failed');
  toast(`Deleted ${r.deleted} failed jobs`);
  refresh();
}

async function cleanup() {
  const r = await api('POST', '/admin/cleanup');
  toast(`Cleaned: ${r.job_dirs} dirs, ${r.youtube_cache_files} cache files, ${r.failed_jobs_deleted} old rows. Disk: ${r.disk_usage}`);
  refresh();
}

async function uploadCookies() {
  const file = $('#cookieFile').files[0];
  if (!file) { toast('Select a cookies.txt file first'); return; }
  const form = new FormData();
  form.append('file', file);
  const sep = '?';
  const url = '/admin/upload-cookies' + sep + 'token=' + encodeURIComponent(getToken());
  const r = await fetch(url, { method: 'POST', body: form });
  const data = await r.json();
  if (data.ok) {
    toast(`Cookies uploaded: ${data.size} bytes`);
  } else {
    toast('Upload failed: ' + (data.detail || 'unknown error'));
  }
  refresh();
}

// Auto-refresh every 30 seconds
setInterval(refresh, 30000);
</script>
</body>
</html>
