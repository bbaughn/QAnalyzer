  - title: "Julia"
    artist: "Uf0"
    file: "test_tracks/julia.wav"
    expected:
      bpm: 145
      bpm_end: 145
      # FAILING: algorithm detects G phrygian / C minor instead of F minor.
      # Root cause: F (the true tonic) has weak global chroma energy (0.375),
      # while G (the supertonic/iim in F minor) dominates at 0.713. Both the
      # cosine profile and argmax lock onto G as the global root. Per-window,
      # C minor wins because C minor contains both the strong G (5th) and Ab
      # (b6), outscoring F minor by 0.044. Even when root is forced to F, the
      # minor→dorian disambiguation fires (D > Db × 1.1) giving F dorian.
      # Fix requires low-frequency (bass) weighted chroma to suppress the
      # prominent supertonic synth line and surface the true bass root F.
      key:
        root: "F"
        mode: "minor"
      key_end:
        root: "F"
        mode: "minor"
      tuning: -25
      tuning_end: -25
      no_drums: false
      bars_percussion: 0
      bpm: 145
      bpm_end: 145
      swing: false

  - title: "Slios"
    artist: "Durante"
    file: "test_tracks/silos.wav"
    expected:
      bpm: 120
      bpm_end: 120
      # FAILING: algorithm detects Gb major instead of Bb minor.
      # Root cause: strong B/Cb note (0.43 chroma energy) is the 4th of Gb
      # major and the b2 of Bb phrygian. The track's pitch-class set {1,3,5,6,8,10,11}
      # perfectly fits the Gb major scale (which includes Cb), while Bb minor
      # uses {0,1,3,5,6,8,10} (C natural instead of Cb). The KS winner is
      # Gb major (0.926) vs Bb minor (0.878). Fix requires bass-weighted chroma
      # to identify Bb as the tonal bass root rather than Db (the dominant 5th).
      key:
        root: "Bb"
        mode: "minor"
      key_end:
        root: "Bb"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: true
      bars_percussion: 0
      # FAILING: algorithm detects swing=true (score=0.69) even with correct
      # 120 BPM beat grid. The track has ~9% of offbeats landing late (>0.65
      # into the beat interval), which fires the sparse-late-offbeat scorer.
      # Not simply a BPM artifact — present on correct-BPM beats too.
      swing: false

