  - title: "Blooms"
    artist: "Sau Poler"
    file: "test_tracks/blooms.wav"
    expected:
      bpm: 107
      bpm_end: 107
      # Key now passing via MIDI M3/b7 refinement.
      # A dominates 82% of frames (strong bass drone), suppressing no_key via the
      # MIDI active-PC guard (4 MIDI PCs > 5% confirms tonal content). Chroma
      # Krumhansl was landing on A minor/major because the b7 (G) and nat7 (Ab)
      # are near-equal in global chroma. MIDI cleanly confirms major family via
      # M3 (C#/Db=7.5%) >> b3 (C≈0%), then confirms mixolydian via b7 (G=1.8%)
      # >> nat7 (Ab≈0%), overriding the per-window chroma mode to mixolydian.
      no_key: false
      key:
        root: "A"
        mode: "mixolydian"
      key_end:
        root: "A"
        mode: "mixolydian"
      key_djaypro:
        root: "A"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      # FAILING: algorithm detects 24 bars of percussion-only intro before
      # harmonic content joins.  True bars_percussion is 0 — drums and
      # harmony coexist from beat 1.  The harmonic-start detector requires
      # a window of consecutive beats with stable chroma + low percussive
      # ratio + low attack/sustain, but heavy drums from the start push
      # those thresholds and the harmonic content isn't "recognized" until
      # much later in the track.
      bars_percussion: 0
      swing: false

  - title: "Burned Oak"
    artist: "Quince"
    file: "test_tracks/burned_oak.wav"
    expected:
      # FAILING: algorithm detects 87 BPM. True tempo is 90.
      # FAILING: no_key fires because exactly 4 PCs dominate frame-by-frame argmax
      # (E=69%, G#=16%, A=9%, F=2%) — same statistical fingerprint as tuned percussion
      # (Melchom). The track is genuinely tonal (E phrygian dominant throughout per
      # raw key segments), but n_competitive_pcs=4 hits the <=4 threshold.
      # True key is E phrygian (user assessment; spreadsheet records Em).
      # no_drums passing via the soft-drums rescue (added with Circadia).
      bpm: 90
      bpm_end: 90
      key:
        root: "E"
        mode: "phrygian"
      key_end:
        root: "E"
        mode: "phrygian"
      key_djaypro:
        root: "E"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      # FAILING: algorithm now detects 8 bars of percussion-only intro before
      # harmonic content joins (newly visible after no_drums was fixed by the
      # soft-drums rescue — previously masked because no_drums=True forces
      # bars_percussion=0).  True bars_percussion is 0 — drums and harmony
      # coexist from beat 1.  Same harmonic-start false-delay pattern as
      # Blooms / Tikken / Vegyn / Time of Nectar / Soft Light.
      bars_percussion: 0
      swing: false

