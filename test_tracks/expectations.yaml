  - title: "Spirit in Tala"
    artist: "Chari Chari"
    file: "test_tracks/spirit_in_tala_2.wav"
    expected:
      # FAILING: algorithm detects 128 BPM. True tempo is 64 BPM (halftime feel).
      # Snare lands on beat 3 of the 128-grid (halftime pattern), same failure mode
      # as Ghost of Akina. 128 = 64 × 2.
      # Note: spirit_in_tala_2.wav is the server's 44.1kHz mono download (25MB);
      # the original 48kHz stereo download gives 127 due to beat tracker variance.
      bpm: 64
      bpm_end: 64
      # P5 correction redirected to D by MIDI validation (fixed).
      # Sitar sympathetic strings generate strong B and C chroma energy (B=0.601,
      # C=0.582), dominating the true tonic D (0.444). B wins the chroma root, the
      # P5 correction then fires (C/Db ratio 1.441 > 1.25) converting B → E minor.
      # Basic-Pitch MIDI transcription correctly identifies D as the top pitch class
      # (45% of weighted duration; A=25%, G=25%), which is a third root — neither
      # the pre-P5 root (B) nor the post-P5 root (E). The MIDI redirect overrides
      # global_root_idx to D with a forced window margin, and unconstrained mode
      # detection then correctly finds D mixolydian (b7=C is strong, no E audible).
      key:
        root: "D"
        mode: "mixolydian"
      key_end:
        root: "D"
        mode: "mixolydian"
      key_djaypro:
        root: "D"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 0
      swing: false

