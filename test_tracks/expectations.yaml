tracks:

  - title: "Crying Juno"
    artist: "Matthias Meyer & Ryan Davis"
    file: "test_tracks/juno.wav"
    intro_file: "test_tracks/juno_intro.wav"
    # bpm_end matches tempo_bpm_rounded of the last section
    # key / key_end match key+mode of the first / last section
    # tuning / tuning_end match tuning_rounded of the first / last section
    expected:
      bpm: 120
      bpm_end: 120
      key:
        root: "Eb"
        mode: "minor"
      key_end:
        root: "Eb"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      # FAILING: algorithm detects beat 88 (22 bars) instead of beat 96 (24 bars).
      # The melody entry at beat 88 passes all thresholds (chroma, perc_ratio, atk) slightly
      # earlier than the true 24-bar mark. Would need tighter atk/perc thresholds or a
      # bar-boundary snapping pass to push detection forward to the next 8-beat boundary.
      bars_percussion: 24
      swing: false

  - title: "Subterano"
    artist: "Guy Contact"
    file: "test_tracks/subterano.wav"
    expected:
      bpm: 120
      bpm_end: 120
      key:
        root: "A"
        mode: "mixolydian"
      key_end:
        root: "A"
        mode: "mixolydian"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 0
      swing: false

  - title: "Funky Shit"
    artist: "Prodigy"
    file: "test_tracks/funkyshit.wav"
    expected:
      bpm: 125
      bpm_end: 125
      # FAILING: Krumhansl-Schmuckler correlation gives Ab minor a 0.037 score advantage
      # over B minor. Ab/G# chroma bin has high energy (0.640) and lands at the 6.33
      # tonic-weight position in the Ab minor profile. B has higher raw energy (0.692)
      # but distributes across multiple profile positions less favorably. Fix requires
      # downbeat/bass weighting so the rhythmically-emphasized root (B) wins over
      # coincidental spectral overlap at Ab.
      key:
        root: "B"
        mode: "minor"
      key_end:
        root: "B"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 0
      swing: true

  - title: "Rain and Snow Mixture"
    artist: "Monolithic"
    file: "test_tracks/monolithic.wav"
    intro_file: "test_tracks/monolithic_intro.wav"
    expected:
      # bpm/bpm_end omitted — tempo detection unstable on this track
      key:
        root: "Bb"
        mode: "dorian"
      key_end:
        root: "Bb"
        mode: "dorian"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 8
      swing: true
