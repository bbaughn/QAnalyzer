  - title: "Ghost of Akina (Aya 2010 All At Once Remix)"
    artist: "Hodge"
    file: "test_tracks/hodge.wav"
    expected:
      # FAILING: beat tracker finds 140 throughout. First half is halftime feel
      # (snare on beat 3 of the 140 grid = 70 BPM groove). Fix requires halftime
      # detection — snare-on-3 analysis or onset density relative to beat grid.
      bpm: 70
      bpm_end: 140
      # FAILING: algorithm detects Db minor. Root cause is the halftime BPM error:
      # 140 BPM beat-sync captures F and Bb during note decays in the first half,
      # suppressing them (Bb 0.510→0.457, A 0.489→0.523) and flipping the mode
      # discriminating degrees (3rd: F<E, 6th: Bb<A) from Db major to Db minor.
      # Raw CQT chroma correctly points to Db major (= relative major of Bb minor).
      # Fix halftime BPM → fixes mode. Root Db→Bb still requires further work.
      key:
        root: "Bb"
        mode: "minor"
      key_end:
        root: "Bb"
        mode: "minor"
      key_djaypro:
        root: "Bb"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 0
      swing: false

