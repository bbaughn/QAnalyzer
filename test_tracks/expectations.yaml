      # Key passing via the phantom-argmax escape in the MIDI disambiguator:
      # chroma argmax G is overwhelming (0.98) but MIDI shows G = 1.2%, so
      # the chroma top is recognized as overtone bleed.  The disambiguator
      # then widens the candidate set to all high-coverage MIDI candidates
      # and picks Eb minor (cov 0.988, tonic 27.7%) over the relative-key
      # competitors Bb minor / Db major / Db dorian (the differentiated
      # mode bonus prefers natural minor over dorian at coverage ties).
