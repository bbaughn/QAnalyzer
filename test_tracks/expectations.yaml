  - title: "CIRCLONT6A"
    artist: "Aphex Twin"
    file: "test_tracks/circlont6a.wav"
    expected:
      bpm: 142
      bpm_end: 142
      # User-confirmed via re-listening: track modulates G minor → Bb minor
      # → G minor.  tracks.csv records Bb minor (the middle section), but
      # the crude key/key_end designation is technically correct as G minor
      # both at start and end.  Our two-point key snapshot doesn't capture
      # the modulation; that's a corpus-wide limitation, not specific to
      # this track.
      key:
        root: "G"
        mode: "minor"
      key_end:
        root: "G"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 0
      # FAILING: algorithm detects swing; track is straight per tracks.csv.
      # The "syrobonkus mix" has aggressive microtiming displacement and
      # polyrhythmic glitch patterns that the offbeat-delay swing detector
      # reads as consistent offbeat lateness.
      swing: false

  - title: "Circadia"
    artist: "Tornado Wallace"
    file: "test_tracks/circadia.wav"
    expected:
      bpm: 110
      bpm_end: 110
      # FAILING: algorithm detects Eb major.  Track is actually Ab minor but
      # alternates between i (Ab minor triad) and V (Eb major triad) — the
      # harmonic-minor V chord puts Eb-G-Bb prominently in the MIDI (Eb=59%,
      # G=21%, Bb=9% — exactly the V chord tones).  Algorithm latches onto
      # the dominant chord as if it were the tonic.  Distinguishing "minor key
      # with strong V chord" from "major key on the V chord's root" requires
      # harmonic structural analysis (chord progression / cadence detection)
      # rather than note-frequency counting.
      key:
        root: "Ab"
        mode: "minor"
      key_end:
        root: "Ab"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      # no_drums passing via the soft-drums rescue: HPSS partially routed the
      # filtered sub-bass kick to the harmonic component (perc_ratio_p95=0.467,
      # below the secondary 0.55 gate), but onsets are loud (onset_p95=5.24)
      # and beats are not pure-sustain (atk_p95=1.80), so the rescue fires.
      no_drums: false
      bars_percussion: 0
      swing: true

  - title: "Dear CZ"
    artist: "Olde Gods"
    file: "test_tracks/dear_cz.wav"
    expected:
      bpm: 115
      bpm_end: 115
      # FAILING: algorithm detects Ab major; true key is D minor with
      # heavy use of the blue note Ab (user-confirmed by re-listening).
      # The algorithm has no special handling for blue notes: Ab dominates
      # chroma (18.7%, vs A at 15.8% and D at only 7.1%) and Ab is the
      # MIDI tonic at 43.4%, with D registering as the b5 (22.9%) — the
      # classic Ab+D tritone locrian signature.  Top global Krumhansl
      # candidate is Ab locrian (0.945), D minor doesn't crack the top 8.
      # Detecting "D minor with a blue note" vs "Ab locrian" from chroma
      # alone is essentially impossible — they share the same pitch
      # collection.  Would need bassline/melody-tonic detection.
      key:
        root: "D"
        mode: "minor"
      # FAILING: same as key (see above).
      key_end:
        root: "D"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      # FAILING: algorithm detects 24 bars of percussion-only intro; true
      # bars_percussion is 0 per tracks.csv.  Another case of tuned
      # percussion in the intro that's ambiguous between "pitched harmonic
      # content" and "pure percussion" — the harmonic-start detector
      # waits for unambiguously tonal material before declaring the entry.
      bars_percussion: 0
      swing: false

