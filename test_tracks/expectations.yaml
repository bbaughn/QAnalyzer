      # FAILING: algorithm detects B dorian (root = strongest chroma PC, B at 13.1%).
      # True tonic is D; B is the 6th degree of D major and the most frequent melody
      # note. Bass-weighted chroma does NOT fix this: B scores 0.935 in the C1-C3
      # sub-bass register while D is only 5th at 0.601 — the melody is strong enough
      # to outrank the tonic at every frequency band. Fix requires harmonic function
      # analysis (understanding scale degree roles), not just note density.
      key:
        root: "D"
        mode: "major"
      key_end:
        root: "D"
        mode: "major"
      key_djaypro:
        root: "D"
        mode: "major"
