  - title: "Funky Shit"
    artist: "Prodigy"
    file: "test_tracks/funkyshit.wav"
    expected:
      bpm: 125
      bpm_end: 125
      # FAILING: Root correctly detects as B (global_root_idx constraint), but B mixolydian
      # consistently wins per-window over B minor in the Krumhansl correlation. The b7
      # (A) has enough chroma energy to tip the mixolydian profile over minor for most
      # windows. Fix requires either per-beat downbeat/bass weighting to boost the minor
      # 3rd (D) relative to b7, or a post-hoc check that penalises modes inconsistent
      # with the track's harmonic character.
      key:
        root: "B"
        mode: "minor"
      key_end:
        root: "B"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 0
      swing: true

