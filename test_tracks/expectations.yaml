tracks:

  - title: "Affetto"
    artist: "Stijn Sadée"
    file: "test_tracks/affetto.wav"
    expected:
      bpm: 110
      bpm_end: 110
      # FAILING: algorithm detects Eb minor; true key is Gb major.
      # Eb minor is the relative minor of Gb major — they share all 7
      # pitch classes, so this is the most common Krumhansl confusion
      # mode.  No way to distinguish from chroma alone; would need
      # bassline or melody-tonic detection.
      key:
        root: "Gb"
        mode: "major"
      # FAILING: same as key (see above).
      key_end:
        root: "Gb"
        mode: "major"
      tuning: 0
      tuning_end: 0
      no_drums: false
      bars_percussion: 0
      swing: false

  - title: "Alles"
    artist: "Computer Data"
    file: "test_tracks/alles.wav"
    expected:
      # User-corrected: track is ~123.45 BPM by ear, so 123 is fine.
      # Tracks.csv said 124 but algorithm-reported 123 matches the
      # listened-truth more precisely.
      bpm: 123
      bpm_end: 123
      # User-corrected: bass hammers E (algorithm-friendly tonic call),
      # though the melody arguably puts E as the 2nd degree of D major.
      # Algorithm's E minor is musically defensible — same scale pitches
      # as D major (differ only on C vs C#) so chroma can't disambiguate.
      key:
        root: "E"
        mode: "minor"
      key_end:
        root: "E"
        mode: "minor"
      tuning: 0
      tuning_end: 0
      no_drums: false
      # FAILING: 8 bars of percussion-only intro detected.  Familiar
      # harmonic-start false-delay pattern.
      bars_percussion: 0
      swing: false

