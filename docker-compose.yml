services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload --reload-dir app --reload-include 'app/**/*.py' --reload-exclude '.venv/**' --reload-exclude '**/.venv/**' --reload-exclude 'data/**' --reload-exclude '*.db'
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./data/edm_analysis.db
      - STORAGE_ROOT=./data/storage
      - TEMP_ROOT=./data/tmp
    volumes:
      - ./:/app

  worker:
    build: .
    command: python -m app.worker
    environment:
      - DATABASE_URL=sqlite:///./data/edm_analysis.db
      - STORAGE_ROOT=./data/storage
      - TEMP_ROOT=./data/tmp
    volumes:
      - ./:/app
    depends_on:
      - api
